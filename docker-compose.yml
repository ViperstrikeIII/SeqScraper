services:
  redis-db:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data 

  seqscraper-app:
    build: .
    ports:
      - "8050:8050"
    depends_on:
      - redis-db
    environment:
      - REDIS_HOST=redis-db
    volumes:
      - ./data:/app/data
      - .:/app

volumes:
  redis_data: